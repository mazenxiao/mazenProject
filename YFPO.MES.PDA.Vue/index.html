<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <meta name="format-detection" content="telephone=no" />
    <meta name="theme-color" content="#1989fa" />
    <link rel="icon" href="/mes-pda/favicon.svg" type="image/svg+xml" />
    <link rel="manifest" href="/mes-pda/manifest.json" />
    <title>YFPO MES PDA</title>
    <style>
      html,
      body,
      #app {
        margin: 0;
        padding: 0;
        height: 100%;
        background: #f5f7fa;
        -webkit-tap-highlight-color: transparent;
      }
      body {
        font-family:
          -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Helvetica Neue',
          'Microsoft YaHei', Arial, sans-serif;
        font-size: 14px;
        color: #1f2329;
      }
      #initial-loader {
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-direction: column;
        gap: 16px;
        color: #888;
        font-size: 13px;
      }
      #initial-loader .spinner {
        width: 32px;
        height: 32px;
        border: 3px solid #e4e7eb;
        border-top-color: #1989fa;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
      }
      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }
    </style>
  </head>
  <body>
    <div id="app">
      <div id="initial-loader">
        <div class="spinner"></div>
        <div>YFPO MES PDA 加载中…</div>
      </div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
